<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register — Grand Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A;
    --dark: #0F1923; --dark-2: #1A2633; --dark-3: #243040;
    --text: #F0EDE6; --text-muted: #8A9AAB; --error: #E05555;
  }
  body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .bg-pattern { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,168,76,0.07) 0%, transparent 60%); pointer-events: none; }
  .wrap { position: relative; width: 100%; max-width: 440px; padding: 24px; }
  .brand { text-align: center; margin-bottom: 32px; }
  .brand-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 22px; }
  .brand h1 { font-family: 'Playfair Display', serif; font-size: 24px; }
  .card { background: var(--dark-2); border: 1px solid rgba(201,168,76,0.15); border-radius: 20px; padding: 32px; }
  .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
  .field input { width: 100%; background: var(--dark-3); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 11px 14px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: var(--text-muted); }
  .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: var(--dark); cursor: pointer; margin-top: 8px; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { background: rgba(224,85,85,0.12); border: 1px solid rgba(224,85,85,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--error); margin-bottom: 14px; display: none; }
  .login-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-muted); }
  .login-link a { color: var(--gold); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🏨</div>
    <h1>Grand Hotel</h1>
  </div>
  <div class="card">
    <h2>Create account</h2>
    <p class="subtitle">Register to access the management system</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="field"><label>Username</label><input type="text" id="username" placeholder="Choose a username"/></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="your@email.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Create a password"/></div>
    <button class="btn" id="regBtn" onclick="doRegister()">Create Account</button>
    <div class="login-link">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script>
  const API = 'https://hotel-api-549w.onrender.com';

  async function doRegister() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('regBtn');
    const err = document.getElementById('errorMsg');

    if (!username || !email || !password) { showErr('Please fill all fields.'); return; }

    btn.disabled = true; btn.textContent = 'Creating…'; err.style.display = 'none';

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Registration failed');
      window.location.href = 'login.html';
    } catch(e) {
      showErr(e.message);
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  function showErr(msg) {
    const e = document.getElementById('errorMsg');
    e.textContent = msg; e.style.display = 'block';
  }
</script>
</body>
</html>

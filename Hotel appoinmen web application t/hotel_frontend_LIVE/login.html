<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hotel Management — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0F1923;
    --dark-2: #1A2633;
    --dark-3: #243040;
    --text: #F0EDE6;
    --text-muted: #8A9AAB;
    --error: #E05555;
    --success: #4CAF7D;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-pattern {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 80% at 10% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .login-wrap {
    position: relative;
    width: 100%;
    max-width: 440px;
    padding: 24px;
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
  }

  .brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .brand p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: var(--dark-2);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 20px;
    padding: 36px;
  }

  .card h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .card .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--dark-3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
    letter-spacing: 0.03em;
  }

  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: rgba(224,85,85,0.12);
    border: 1px solid rgba(224,85,85,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 16px;
    display: none;
  }

  .register-link {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .register-link a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">🏨</div>
    <h1>Grand Hotel</h1>
    <p>Management System</p>
  </div>
  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to manage your property</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="register-link">
      No account? <a href="register.html">Create one</a>
    </div>
  </div>
</div>
<script>
  const API = 'https://hotel-api-549w.onrender.com';

  if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    if (!username || !password) { showError('Please enter username and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.style.display = 'none';

    try {
      const form = new URLSearchParams();
      form.append('username', username);
      form.append('password', password);

      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: form
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');

      localStorage.setItem('token', data.access_token);
      localStorage.setItem('username', username);
      window.location.href = 'dashboard.html';
    } catch (e) {
      showError(e.message);
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }
</script>
</body>
</html>
